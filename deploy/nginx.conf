server {
    server_name test.easy-parking.mn 152.42.235.199;

    client_max_body_size 10M;

    # Frontend SPA
    root /var/www/parking;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Backend API
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # WebSocket
    location /ws/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    # Static asset caching
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/test.easy-parking.mn/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/test.easy-parking.mn/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    listen 80 default_server;
    server_name test.easy-parking.mn 152.42.235.199;

    # Dahua камерууд HTTPS ITSAPI дэмжихгүй байж болзошгүй тул
    # LPR callback-ийг HTTP-ээр шууд дамжуулна
    location /api/lpr/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Бусад бүх хандалтыг HTTPS рүү чиглүүлнэ
    location / {
        return 301 https://test.easy-parking.mn$request_uri;
    }
}